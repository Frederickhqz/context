<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="apple-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  
  <!-- White background for iOS -->
  <rect width="180" height="180" rx="40" fill="white"/>
  
  <!-- C curve (connecting path) -->
  <path 
    d="M125 34 C56 34 34 68 34 90 C34 112 56 146 125 146"
    stroke="url(#apple-gradient)"
    stroke-width="14"
    stroke-linecap="round"
    fill="none"
    opacity="0.5"
  />
  
  <!-- Nodes forming the C shape -->
  <!-- Top end -->
  <circle cx="112" cy="34" r="22" fill="url(#apple-gradient)"/>
  <circle cx="112" cy="34" r="11" fill="white" opacity="0.5"/>
  
  <!-- Top curve -->
  <circle cx="68" cy="50" r="17" fill="url(#apple-gradient)"/>
  
  <!-- Left side (inner) -->
  <circle cx="45" cy="79" r="14" fill="url(#apple-gradient)"/>
  <circle cx="45" cy="101" r="14" fill="url(#apple-gradient)"/>
  
  <!-- Bottom curve -->
  <circle cx="68" cy="130" r="17" fill="url(#apple-gradient)"/>
  
  <!-- Bottom end -->
  <circle cx="112" cy="146" r="22" fill="url(#apple-gradient)"/>
  <circle cx="112" cy="146" r="11" fill="white" opacity="0.5"/>
</svg>