<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="logo-text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  
  <!-- Icon - C made of connected nodes -->
  <!-- C curve -->
  <path 
    d="M28 8 C10 8 4 14 4 20 C4 26 10 32 28 32"
    stroke="url(#logo-icon-gradient)"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
    opacity="0.5"
  />
  
  <!-- Nodes -->
  <circle cx="25" cy="8" r="5" fill="url(#logo-icon-gradient)"/>
  <circle cx="25" cy="8" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="15" cy="11" r="4" fill="url(#logo-icon-gradient)"/>
  <circle cx="10" cy="17" r="3.5" fill="url(#logo-icon-gradient)"/>
  <circle cx="10" cy="23" r="3.5" fill="url(#logo-icon-gradient)"/>
  <circle cx="15" cy="29" r="4" fill="url(#logo-icon-gradient)"/>
  <circle cx="25" cy="32" r="5" fill="url(#logo-icon-gradient)"/>
  <circle cx="25" cy="32" r="2.5" fill="white" opacity="0.5"/>
  
  <!-- Text -->
  <text x="52" y="27" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="url(#logo-text-gradient)">Context</text>
</svg>